name: QA Tester

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run QA Audit
        run: node qa/audit.js

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: qa-tester-report
          path: QA_TESTER_REPORT.md
